name: Build Blender Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Model conversion ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install conversion dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install "mlx[cpu]" numpy pillow safetensors onnx onnxruntime huggingface_hub

      - name: Clone and install SAM2
        run: |
          mkdir -p .cache
          git clone https://github.com/facebookresearch/segment-anything-2.git .cache/sam2_repo
          pip install -e .cache/sam2_repo

      - name: Convert MedSAM2 models (MLX + ONNX)
        run: python convert_medsam2_ci.py

      - name: Verify converted models
        run: |
          echo "MLX model:"
          ls -lh extension/ml/medsam2_mlx/
          echo "ONNX models:"
          ls -lh extension/ml/medsam2_onnx/

      # ── Extension build ─────────────────────────────────────────
      - name: Install Blender
        run: |
          wget -q https://download.blender.org/release/Blender5.0/blender-5.0.0-linux-x64.tar.xz
          tar -xf blender-5.0.0-linux-x64.tar.xz

      - name: Build platform-specific extensions
        run: |
          chmod +x build_extension_ci.sh
          ./build_extension_ci.sh --blender-path "${{ github.workspace }}/blender-5.0.0-linux-x64/blender"

      - name: List final builds
        run: |
          echo "Final extension packages:"
          ls -lh dist/

      # ── Upload ──────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blender-extension-all-platforms
          path: dist/*.zip

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body: |
            ## DICOM to VDB Extension - Platform-Specific Builds

            Download the appropriate version for your system:
            - **Windows**: `DCM2VDB-*-windows-x64.zip`
            - **macOS (Apple Silicon)**: `DCM2VDB-*-macos-arm64.zip`
            - **Linux**: `DCM2VDB-*-linux-x64.zip`

            ### Installation
            1. Download the zip file for your platform
            2. In Blender, go to Edit > Preferences > Extensions
            3. Click the dropdown menu (⌄) and select "Install from Disk"
            4. Select the downloaded zip file

            Each package includes only the ML models needed for that platform.
          draft: false
          prerelease: false
